<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<title>Mod Creator GOD 😈</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script><style>
body { background:#0f172a; color:white; font-family:Arial; text-align:center; }
.container { background:#1e293b; padding:20px; border-radius:15px; max-width:600px; margin:auto; }
input, select, button { width:90%; padding:10px; margin:8px; border-radius:8px; border:none; }
button { background:#22c55e; cursor:pointer; }
.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:5px; margin-top:10px; }
.grid img { width:100%; cursor:pointer; border-radius:8px; border:2px solid transparent; }
.grid img:hover { border:2px solid #22c55e; }
.preview { margin-top:15px; }
.preview img { width:100px; image-rendering:pixelated; }
</style></head><body><h1>🔥 Mod Creator GOD 😈</h1><div class="container"><input id="itemName" placeholder="nombre_item"><select id="effect">
<option value="regeneration">Regeneración</option>
<option value="speed">Velocidad</option>
<option value="strength">Fuerza</option>
</select><input id="duration" type="number" value="10">
<input id="level" type="number" value="5"><h3>🔎 Buscar textura</h3>
<input id="search" placeholder="banana minecraft texture">
<button onclick="buscar()">Buscar</button><div id="imagenes" class="grid"></div><div class="preview">
<h3>Preview del ítem</h3>
<img id="previewImg" src="">
</div><button onclick="generar()">DESCARGAR MOD 😈</button>

</div><script>
let selectedImage = "";

function buscar(){
  let q = document.getElementById("search").value + " minecraft item";
  let container = document.getElementById("imagenes");
  container.innerHTML = "";

  for(let i=0;i<6;i++){
    let img = document.createElement("img");
    img.src = "https://source.unsplash.com/200x200/?" + encodeURIComponent(q + i);

    img.onclick = () => {
      selectedImage = img.src;
      document.getElementById("previewImg").src = selectedImage;
    };

    container.appendChild(img);
  }
}

function uuid(){
return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{
const r=Math.random()*16|0,v=c=='x'?r:(r&0x3|0x8);
return v.toString(16);
});
}

async function generar(){
  let zip = new JSZip();

  let name = document.getElementById("itemName").value || "item";
  let effect = document.getElementById("effect").value;
  let duration = document.getElementById("duration").value;
  let level = document.getElementById("level").value - 1;

  let id = "ia:" + name;

  let manifest = {
    format_version:2,
    header:{name:name,uuid:uuid(),version:[1,0,0]},
    modules:[{type:"data",uuid:uuid(),version:[1,0,0]}]
  };

  let item = {
    format_version:"1.20.10",
    "minecraft:item":{
      description:{identifier:id},
      components:{
        "minecraft:icon":"apple",
        "minecraft:food":{
          nutrition:5,
          can_always_eat:true,
          effects:[{name:effect,duration:duration,amplifier:level}]
        }
      }
    }
  };

  let bp = zip.folder("mod_BP");
  bp.file("manifest.json", JSON.stringify(manifest,null,2));
  bp.folder("items").file(name+".json", JSON.stringify(item,null,2));

  let blob = await zip.generateAsync({type:"blob"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name + ".mcaddon";
  a.click();
}
</script></body>
</html>
