<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mod Creator</title><script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script><script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script><style>
body { background:#0f172a; color:white; font-family:Arial; text-align:center; }
.container { background:#1e293b; padding:20px; border-radius:15px; max-width:700px; margin:auto; }

input, button {
  width:90%;
  padding:10px;
  margin:10px;
  border-radius:8px;
  border:none;
}

button { background:#22c55e; cursor:pointer; }

canvas {
  width:100%;
  height:300px;
  background:#000;
  border-radius:10px;
}
</style></head><body><h1>Mod Creator</h1><div class="container"><input id="itemName" placeholder="nombre_item"><h3>📦 Modelo (.geo.json)</h3>
<input type="file" id="modelFile">
<button onclick="cargarModelo()">Cargar modelo</button>
<button onclick="pegarModelo()">Pegar modelo 😈</button><h3>🖼️ Textura (.png)</h3>
<input type="file" id="textureFile"><h3>🧊 Preview 3D</h3>
<canvas id="preview"></canvas><button onclick="generar()">DESCARGAR MOD 💀</button>

</div><script>
let scene, camera, renderer, controls, model;
let modelJSON = null;
let textureBlob = null;

// 🔥 INIT 3D
function init3D(){
  const canvas = document.getElementById("preview");

  renderer = new THREE.WebGLRenderer({canvas});
  renderer.setSize(canvas.clientWidth, canvas.clientHeight);

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    75,
    canvas.clientWidth/canvas.clientHeight,
    0.1,
    1000
  );

  controls = new THREE.OrbitControls(camera, renderer.domElement);

  let light = new THREE.PointLight(0xffffff,1);
  light.position.set(5,5,5);
  scene.add(light);

  scene.add(new THREE.AmbientLight(0xffffff,0.7));

  animate();
}

function animate(){
  requestAnimationFrame(animate);
  if(model) model.rotation.y += 0.01;
  controls.update();
  renderer.render(scene, camera);
}

// 🔥 CREAR MODELO
function construirModelo(json){
  if(model) scene.remove(model);

  let group = new THREE.Group();
  let geo = json["minecraft:geometry"][0];

  geo.bones.forEach(bone=>{
    if(bone.cubes){
      bone.cubes.forEach(c=>{
        let g = new THREE.BoxGeometry(
          c.size[0]/16,
          c.size[1]/16,
          c.size[2]/16
        );

        let m = new THREE.MeshStandardMaterial({color:0xffffff});
        let mesh = new THREE.Mesh(g,m);

        mesh.position.set(
          (c.origin[0]+c.size[0]/2)/16,
          (c.origin[1]+c.size[1]/2)/16,
          (c.origin[2]+c.size[2]/2)/16
        );

        group.add(mesh);
      });
    }
  });

  let box = new THREE.Box3().setFromObject(group);
  let center = box.getCenter(new THREE.Vector3());
  group.position.sub(center);

  camera.position.z = 3;

  model = group;
  scene.add(model);
}

// 📦 CARGAR MODELO
function cargarModelo(){
  let file = document.getElementById("modelFile").files[0];
  if(!file){ alert("Sube modelo 😡"); return; }

  let reader = new FileReader();
  reader.onload = e=>{
    modelJSON = e.target.result;
    construirModelo(JSON.parse(modelJSON));
  };
  reader.readAsText(file);
}

// 😈 PEGAR MODELO
async function pegarModelo(){
  try{
    let text = await navigator.clipboard.readText();
    modelJSON = text;
    construirModelo(JSON.parse(text));
  }catch(e){
    alert("Error al pegar 💀");
  }
}

// 🖼️ TEXTURA
document.getElementById("textureFile").addEventListener("change", e=>{
  textureBlob = e.target.files[0];

  let url = URL.createObjectURL(textureBlob);
  let loader = new THREE.TextureLoader();

  loader.load(url, tex=>{
    if(model){
      model.traverse(obj=>{
        if(obj.isMesh){
          obj.material.map = tex;
          obj.material.needsUpdate = true;
        }
      });
    }
  });
});

// 🔑 UUID
function uuid(){
return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{
const r=Math.random()*16|0,v=c=='x'?r:(r&0x3|0x8);
return v.toString(16);
});
}

// 💀 GENERAR MOD (FIX TOTAL)
async function generar(){
  if(!modelJSON || !textureBlob){
    alert("Falta modelo o textura 💀");
    return;
  }

  let zip = new JSZip();
  let name = document.getElementById("itemName").value || "item";

  // 📦 RP
  let rp = zip.folder(name+"_RP");

  rp.file("manifest.json", JSON.stringify({
    format_version:2,
    header:{
      name:name+" RP",
      description:"Recurso",
      uuid:uuid(),
      version:[1,0,0]
    },
    modules:[
      {type:"resources",uuid:uuid(),version:[1,0,0]}
    ]
  },null,2));

  rp.folder("models/entity").file(name+".geo.json", modelJSON);
  rp.folder("textures/items").file(name+".png", textureBlob);

  rp.folder("textures").file("item_texture.json", JSON.stringify({
    resource_pack_name:"mod",
    texture_name:"atlas.items",
    texture_data:{
      [name]:{textures:"textures/items/"+name}
    }
  },null,2));

  // 📦 BP
  let bp = zip.folder(name+"_BP");

  bp.file("manifest.json", JSON.stringify({
    format_version:2,
    header:{
      name:name+" BP",
      description:"Behavior",
      uuid:uuid(),
      version:[1,0,0]
    },
    modules:[
      {type:"data",uuid:uuid(),version:[1,0,0]}
    ]
  },null,2));

  bp.folder("items").file(name+".json", JSON.stringify({
    "format_version":"1.20.10",
    "minecraft:item":{
      "description":{
        "identifier":"mod:"+name,
        "menu_category":{"category":"equipment"}
      },
      "components":{
        "minecraft:icon":name
      }
    }
  },null,2));

  // 💾 DESCARGA FIX ANDROID
  let blob = await zip.generateAsync({type:"blob"});

  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name + ".mcaddon";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

init3D();
</script></body>
</html>
