<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="https://i.imgur.com/tuimagen.png">
<title>Mod Creator</title><script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script><script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script><style>
body { background:#0f172a; color:white; font-family:Arial; text-align:center; }
.container { background:#1e293b; padding:20px; border-radius:15px; max-width:700px; margin:auto; }

input, button {
  width:90%;
  padding:10px;
  margin:10px;
  border-radius:8px;
  border:none;
}

button { background:#22c55e; cursor:pointer; }

canvas {
  width:100%;
  height:300px;
  background:#000;
  border-radius:10px;
}

#modalExport {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}
.modal-box {
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  width:300px;
}
</style></head><body><h1>Mod Creator</h1><div class="container">
<input id="itemName" placeholder="nombre_item"><h3>📦 Modelo (.geo.json)</h3>
<input type="file" id="modelFile">
<button onclick="cargarModelo()">Cargar modelo</button>
<button onclick="pegarModelo()">Pegar modelo </button><h3>Textura (.png)</h3>
<input type="file" id="textureFile"><h3>🧊 Preview 3D</h3>
<canvas id="preview"></canvas><button onclick="generar()">EXPORTAR MOD</button>

</div><div id="modalExport">
  <div class="modal-box">
    <h2>💀 Exportar Mod</h2>
    <button onclick="exportarJuego()">Abrir en Minecraft</button>
    <button onclick="descargarMod()">Descargar 📥</button>
    <br><br>
    <button onclick="cerrarModal()">Cerrar</button>
  </div>
</div><script>
let scene, camera, renderer, controls, model;
let modelJSON = null;
let textureBlob = null;

function init3D(){
  const canvas = document.getElementById("preview");

  renderer = new THREE.WebGLRenderer({canvas});
  renderer.setSize(canvas.clientWidth, canvas.clientHeight);

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(75, canvas.clientWidth/canvas.clientHeight, 0.1, 1000);
  controls = new THREE.OrbitControls(camera, renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff,0.7));
  let light = new THREE.PointLight(0xffffff,1);
  light.position.set(5,5,5);
  scene.add(light);

  animate();
}

function animate(){
  requestAnimationFrame(animate);
  if(model) model.rotation.y += 0.01;
  controls.update();
  renderer.render(scene, camera);
}

function construirModelo(json){
  try{
    if(model) scene.remove(model);

    let group = new THREE.Group();
    let geo = json["minecraft:geometry"][0];

    geo.bones.forEach(bone=>{
      if(bone.cubes){
        bone.cubes.forEach(c=>{
          let g = new THREE.BoxGeometry(c.size[0]/16,c.size[1]/16,c.size[2]/16);
          let m = new THREE.MeshStandardMaterial({color:0xffffff});
          let mesh = new THREE.Mesh(g,m);

          mesh.position.set(
            (c.origin[0]+c.size[0]/2)/16,
            (c.origin[1]+c.size[1]/2)/16,
            (c.origin[2]+c.size[2]/2)/16
          );

          group.add(mesh);
        });
      }
    });

    camera.position.z = 3;
    model = group;
    scene.add(model);

  }catch(e){
    alert("Error en modelo 💀: " + e.message);
  }
}

function cargarModelo(){
  let file = document.getElementById("modelFile").files[0];
  if(!file){ alert("Sube modelo 😡"); return; }

  let reader = new FileReader();
  reader.onload = e=>{
    modelJSON = e.target.result;
    try{
      construirModelo(JSON.parse(modelJSON));
    }catch(err){
      alert("JSON inválido 💀");
    }
  };
  reader.readAsText(file);
}

async function pegarModelo(){
  try{
    let text = await navigator.clipboard.readText();
    modelJSON = text;
    construirModelo(JSON.parse(text));
  }catch(e){
    alert("Error al pegar 💀");
  }
}

document.getElementById("textureFile").addEventListener("change", e=>{
  textureBlob = e.target.files[0];

  let url = URL.createObjectURL(textureBlob);
  let loader = new THREE.TextureLoader();

  loader.load(url, tex=>{
    if(model){
      model.traverse(obj=>{
        if(obj.isMesh){
          obj.material.map = tex;
          obj.material.needsUpdate = true;
        }
      });
    }
  });
});

function uuid(){
return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{
const r=Math.random()*16|0,v=c=='x'?r:(r&0x3|0x8);
return v.toString(16);
});
}

async function generar(){
  try{

    let zip = new JSZip();
    let name = document.getElementById("itemName").value || "item";

    if(!modelJSON){
      modelJSON = JSON.stringify({
        "format_version": "1.12.0",
        "minecraft:geometry": [{
          "description": {"identifier":"geometry.default","texture_width":16,"texture_height":16},
          "bones": [{
            "name":"root",
            "pivot":[0,0,0],
            "cubes":[{"origin":[-4,0,-4],"size":[8,8,8],"uv":[0,0]}]
          }]
        }]
      });
    }

    if(!textureBlob){
      let canvas = document.createElement("canvas");
      canvas.width = 16;
      canvas.height = 16;
      let ctx = canvas.getContext("2d");
      ctx.fillStyle = "red";
      ctx.fillRect(0,0,16,16);
      textureBlob = await new Promise(res=>canvas.toBlob(res));
    }

    let rp = zip.folder(name+"_RP");
    let bp = zip.folder(name+"_BP");

    rp.file("manifest.json", JSON.stringify({
      format_version:2,
      header:{name:name+" RP",uuid:uuid(),version:[1,0,0],min_engine_version:[1,20,0]},
      modules:[{type:"resources",uuid:uuid(),version:[1,0,0]}]
    }));

    bp.file("manifest.json", JSON.stringify({
      format_version:2,
      header:{name:name+" BP",uuid:uuid(),version:[1,0,0],min_engine_version:[1,20,0]},
      modules:[{type:"data",uuid:uuid(),version:[1,0,0]}]
    }));

    rp.folder("models/entity").file(name+".geo.json", modelJSON);
    rp.folder("textures/items").file(name+".png", textureBlob);

    rp.folder("textures").file("item_texture.json", JSON.stringify({
      resource_pack_name:"mod",
      texture_name:"atlas.items",
      texture_data:{
        [name]:{textures:"textures/items/"+name}
      }
    }));

    bp.folder("items").file(name+".json", JSON.stringify({
      "format_version":"1.20.10",
      "minecraft:item":{
        "description":{"identifier":"mod:"+name},
        "components":{"minecraft:icon":name}
      }
    }));
// 🎨 ICONO LOCAL (SIN INTERNET)
let canvasIcon = document.createElement("canvas");
canvasIcon.width = 64;
canvasIcon.height = 64;

let ctxIcon = canvasIcon.getContext("2d");

// fondo negro
ctxIcon.fillStyle = "#111";
ctxIcon.fillRect(0,0,64,64);

// cuadrado verde
ctxIcon.fillStyle = "#22c55e";
ctxIcon.fillRect(16,16,32,32);

// convertir a blob
let icon = await new Promise(res => canvasIcon.toBlob(res));

rp.file("pack_icon.png", icon);
bp.file("pack_icon.png", icon);

    let blob = await zip.generateAsync({type:"blob"});
    window.modBlob = blob;

    document.getElementById("modalExport").style.display = "flex";

  }catch(e){
    alert("Error real 💀: " + e.message);
    console.error(e);
  }
}

function descargarMod(){
  let a = document.createElement("a");
  a.href = URL.createObjectURL(window.modBlob);
  a.download = "mod.mcaddon";
  a.click();
}

function exportarJuego(){
  let file = new File([window.modBlob], "mod.mcaddon", {type:"application/x-minecraft-addon"});
  let url = URL.createObjectURL(file);
  window.location.href = url;
}

function cerrarModal(){
  document.getElementById("modalExport").style.display = "none";
}

init3D();
</script></body>
</html>
